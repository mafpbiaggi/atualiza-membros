# compose: dc-atualiza-membros.yaml

networks:
  atualiza_membros:
    name: atualiza_membros

services:
  db_atualiza_membros:
    image: mariadb:12.2
    container_name: db_atualiza_membros
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ${ROOT_DIR}/database:/var/lib/mysql
    restart: always
    networks:
      - atualiza_membros

  app_atualiza_membros:
    image: atualiza-membros-app:1.0
    build:
      context: ${BUILD_CONTEXT}
      dockerfile: Dockerfile
    container_name: app_atualiza_membros
    env_file:
      - .env
    volumes:
      - ${ROOT_DIR}/app:/var/www/html
    ports:
      - "${PORT_MAPPING}:80"
    restart: always
    networks:
      - atualiza_membros
    depends_on:
      - db_atualiza_membros
